<!DOCTYPE html>
<html lang="ru" class="scroll-smooth antialiased">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Инстат | Платформа для управления устойчивым развитием</title>
    
    <!-- SEO & Social Media Meta Tags -->
    <meta name="description" content="Платформа Инстат — цифровое решение для анализа, управления и прогноза устойчивого развития бизнеса в единую экосистему.">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://instat.pro/">
    <meta property="og:title" content="Инстат | Платформа для управления устойчивым развитием">
    <meta property="og:description" content="Цифровое решение для анализа, управления и прогноза устойчивого развития бизнеса.">
    <meta property="og:image" content="https://raw.githubusercontent.com/offbody/instat_page/main/media/platform/platform-bage.png">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://instat.pro/">
    <meta property="twitter:title" content="Инстат | Платформа для управления устойчивым развитием">
    <meta property="twitter:description" content="Цифровое решение для анализа, управления и прогноза устойчивого развития бизнеса.">
    <meta property="twitter:image" content="https://raw.githubusercontent.com/offbody/instat_page/main/media/platform/platform-bage.png">
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="https://raw.githubusercontent.com/offbody/instat_page/main/media/instat-favicon.svg">
    
    <!-- Подключение шрифта Inter Tight -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    
    <style>
      body {
        background-color: #030303;
        color: #FFFFFF;
        font-family: "Inter Tight", sans-serif;
        margin: 0;
      }
      
      .bg-noise {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background-image: url('https://grainy-gradients.vercel.app/noise.svg');
        opacity: 0.03;
        pointer-events: none;
        z-index: -1;
      }

      .bg-grid {
        background-size: 50px 50px;
        background-image: 
          linear-gradient(to right, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
          linear-gradient(to bottom, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
      }

      ::selection {
        background: #0471FF;
        color: #fff;
      }
      
      ::-webkit-scrollbar {
        width: 0px;
        background: transparent;
      }
    </style>
</head>
  <body>
    <div class="bg-noise"></div>
    <div id="root"></div>
    <!-- Vite автоматически найдет этот файл, скомпилирует его и вставит ссылку на бандл -->
    <script type="module" src="/index.tsx"></script>
    <script>
      // Ensure page starts at top on refresh
      window.onbeforeunload = function () {
        window.scrollTo(0, 0);
      };
      if ('scrollRestoration' in history) {
        history.scrollRestoration = 'manual';
      }
    </script>
  </body>
</html>
